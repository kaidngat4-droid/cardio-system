<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام مركز القلب | تسجيل الدخول</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* الخلفية */

body{

font-family:'Tajawal',sans-serif;
margin:0;
height:100vh;

background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1586773860418-d37222d8fce3");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

}

/* شاشة التحميل */

#loadingScreen{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

color:white;
z-index:9999;

}

/* ECG */

#ecg{

width:80%;
height:100px;

background:black;

border:2px solid #0d6efd;

overflow:hidden;

margin-top:20px;

}

#ecg svg{

width:200%;

animation:ecgMove 4s linear infinite;

}

@keyframes ecgMove{

0%{transform:translateX(0)}
100%{transform:translateX(-50%)}

}

/* صندوق تسجيل الدخول */

.loginBox{

background:rgba(255,255,255,0.96);

padding:40px;

border-radius:20px;

width:95%;
max-width:420px;

text-align:center;

box-shadow:0 20px 60px rgba(0,0,0,0.4);

display:none;

}

/* الشعار */

.logo{

width:90px;
margin-bottom:10px;

}

/* النص الرسمي */

.official{

font-size:14px;
line-height:1.6;

}

.ministry{

font-weight:bold;
color:#0d6efd;

}

.hospital{

font-weight:bold;
color:#198754;

}

/* عنوان النظام */

.systemTitle{

font-family:'Aref Ruqaa',serif;
font-size:26px;
margin:15px 0;

color:#0d6efd;

}

/* القلب النابض */

.heartIcon{

font-size:60px;

color:#e60023;

animation:heartBeat 1.1s infinite;

}

@keyframes heartBeat{

0%{transform:scale(1)}
25%{transform:scale(1.3)}
40%{transform:scale(1)}
60%{transform:scale(1.2)}
100%{transform:scale(1)}

}

/* الحقول */

.loginBox input{

width:100%;
padding:12px;
margin:10px 0;

border-radius:10px;
border:1px solid #ccc;

font-size:14px;

}

.loginBox input:focus{

border-color:#0d6efd;

}

/* زر الدخول */

.loginBox button{

width:100%;
padding:12px;

background:linear-gradient(135deg,#0d6efd,#001f4d);

border:none;
color:white;

font-size:16px;
font-weight:bold;

border-radius:10px;

cursor:pointer;

}

/* الخطأ */

#error{

color:red;
margin-top:10px;

}

/* توقيع المطور */

.developerSignature{

margin-top:20px;

font-weight:bold;

background:linear-gradient(90deg,#ff0000,#ffaa00,#00ccff,#ff0000);

-webkit-background-clip:text;
color:transparent;

}

</style>

</head>

<body>

<!-- شاشة التحميل -->

<div id="loadingScreen">

<div>جاري تحميل بيانات النظام...</div>

<div id="ecg">

<svg viewBox="0 0 1000 200">

<polyline

fill="none"

stroke="#00ff00"

stroke-width="4"

points="

0,100
100,100
150,60
200,140
250,100
350,100
400,50
450,150
500,100
650,100
700,60
750,140
800,100
1000,100

"/>

</svg>

</div>

</div>

<!-- صفحة الدخول -->

<div class="loginBox">

<img src="assets/logo.png" class="logo">

<div class="official">

<span class="ministry">وزارة الصحة والبيئة</span><br>

<span class="hospital">هيئة مستشفى الثورة العام – إب</span>

</div>

<div class="heartIcon">
<i class="fa-solid fa-heart-pulse"></i>
</div>

<div class="systemTitle">
نظام مركز القلب
</div>

<input type="text" id="username" placeholder="اسم المستخدم">

<input type="password" id="password" placeholder="كلمة المرور">

<button id="loginBtn">

<i class="fa-solid fa-right-to-bracket"></i>

تسجيل الدخول

</button>

<p id="error"></p>

<div class="developerSignature">

برمجة وتصميم<br>
D / Salah Al-ahdel

</div>

</div>

<!-- صوت القلب -->

<audio id="heartbeatSound" loop>

<source src="sounds/heartbeat.mp3" type="audio/mpeg">

</audio>

<script>

/* التحميل */

window.addEventListener("load",function(){

setTimeout(()=>{

document.getElementById("loadingScreen").style.display="none";

document.querySelector(".loginBox").style.display="block";

/* تشغيل الصوت عند ظهور الصفحة */

let sound=document.getElementById("heartbeatSound");

sound.volume=0.4;

sound.play().catch(()=>{

/* في حال منع الصوت */

document.body.addEventListener("click",function(){

sound.play();

},{once:true});

});

},2000);

});


/* تسجيل الدخول */

document.getElementById("loginBtn").addEventListener("click",function(){

let user=document.getElementById("username").value;

let pass=document.getElementById("password").value;

if(user==="admin" && pass==="770075098"){

localStorage.setItem("loggedIn","true");

/* إيقاف الصوت بعد 30 ثانية */

let sound=document.getElementById("heartbeatSound");

setTimeout(()=>{

sound.pause();

},30000);

setTimeout(()=>{

window.location.href="pages/dashboard.html";

},1000);

}

else{

document.getElementById("error").innerText="بيانات الدخول غير صحيحة";

}

});

</script>

</body>
</html>
