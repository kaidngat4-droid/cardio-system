<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام مركز القلب | تسجيل الدخول</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- شاشة التحميل -->

<div id="loadingScreen">

<div>جاري تحميل النظام...</div>

<div id="ecg">
<div class="ecgLine"></div>
</div>

</div>

<!-- تسجيل الدخول -->

<div class="loginBox">

<img src="assets/logo.png" class="logo">

<div class="official">

<span class="ministry">وزارة الصحة والبيئة</span><br>
<span class="hospital">هيئة مستشفى الثورة العام – إب</span>

</div>

<div class="heartIcon">
<i class="fa-solid fa-heart-pulse"></i>
</div>

<div class="systemTitle">
نظام مركز القلب
</div>

<input type="text" id="username" placeholder="اسم المستخدم">
<input type="password" id="password" placeholder="كلمة المرور">

<button onclick="startLogin()">
<i class="fa-solid fa-right-to-bracket"></i>
تسجيل الدخول
</button>

<p id="error"></p>

<div class="developerSignatureNeon">
برمجة وتصميم<br>
D / Salah Al-ahdel
</div>

</div>

<!-- صوت القلب -->

<audio id="heartbeatSound">
<source src="sounds/heartbeat.mp3" type="audio/mpeg">
</audio>

<!-- سكربت النظام -->
<script src="js/app.js"></script>

<script>

/* تحميل الشاشة */

window.addEventListener("load",function(){

setTimeout(()=>{

document.getElementById("loadingScreen").style.display="none";
document.querySelector(".loginBox").style.display="block";

},2000);

});


/* تشغيل الصوت + تسجيل الدخول */

function startLogin(){

let sound = document.getElementById("heartbeatSound");

/* تشغيل الصوت بعد الضغط (حل مشكلة GitHub) */

sound.volume = 0.4;

sound.play().catch(()=>{});

/* استدعاء login من app.js */

login();

/* إيقاف الصوت بعد 30 ثانية */

setTimeout(()=>{
sound.pause();
sound.currentTime = 0;
},30000);

}

</script>

</body>
</html>
