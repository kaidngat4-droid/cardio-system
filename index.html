<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ملف المريض | نظام مركز القلب</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Tajawal;
background:#f4f6f9;
margin:0;
}

header{

background:linear-gradient(135deg,#0d6efd,#001f4d);
color:white;
padding:15px;
text-align:center;
font-size:22px;

}

.container{

width:95%;
max-width:1100px;
margin:auto;
padding:20px;

}

.card{

background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);

}

.card h3{

color:#0d6efd;
margin-bottom:15px;

}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;

}

input,select{

padding:10px;
border-radius:6px;
border:1px solid #ccc;
width:100%;

}

button{

background:#0d6efd;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;

}

button:hover{

background:#084298;

}

table{

width:100%;
border-collapse:collapse;
margin-top:10px;

}

table th,table td{

border:1px solid #ddd;
padding:8px;
text-align:center;

}

th{

background:#0d6efd;
color:white;

}

</style>

</head>

<body>

<header>

🫀 ملف المريض – نظام مركز القلب

</header>

<div class="container">

<!-- بيانات المريض -->

<div class="card">

<h3>1️⃣ البيانات الأساسية للمريض (Patient Demo)</h3>

<div class="grid">

<input id="patientId" placeholder="رقم المريض (تلقائي)" readonly>

<input id="fullName" placeholder="الاسم الكامل">

<input id="nationalId" placeholder="الرقم الوطني">

<input id="age" placeholder="العمر">

<select id="gender">
<option value="">الجنس</option>
<option>ذكر</option>
<option>أنثى</option>
</select>

<select id="bloodType">
<option value="">فصيلة الدم</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>O+</option>
<option>O-</option>
</select>

</div>

</div>

<!-- التاريخ المرضي -->

<div class="card">

<h3>2️⃣ التاريخ المرضي والعوامل الخطرة</h3>

<div class="grid">

<input id="diagnosis" placeholder="تشخيصات سابقة (CAD / MI)">

<input id="hypertension" placeholder="ضغط الدم">

<input id="diabetes" placeholder="السكري">

<input id="cholesterol" placeholder="الكوليسترول">

<select id="smoking">
<option value="">التدخين</option>
<option>نعم</option>
<option>لا</option>
</select>

<select id="familyHistory">
<option value="">تاريخ عائلي لأمراض القلب</option>
<option>نعم</option>
<option>لا</option>
</select>

</div>

</div>

<!-- الفحوصات -->

<div class="card">

<h3>3️⃣ النتائج السريرية والفحوصات</h3>

<div class="grid">

<input id="bloodPressure" placeholder="ضغط الدم">

<input id="heartRate" placeholder="معدل ضربات القلب">

<input id="hdl" placeholder="HDL">

<input id="ldl" placeholder="LDL">

<input id="triglycerides" placeholder="Triglycerides">

<input id="fbs" placeholder="FBS">

<input id="hba1c" placeholder="HbA1c">

<input id="ecg" placeholder="نتيجة ECG">

</div>

</div>

<!-- العلاج -->

<div class="card">

<h3>4️⃣ الإجراءات والعلاج</h3>

<div class="grid">

<input id="medications" placeholder="الأدوية (Aspirin / Statins / Beta Blockers)">

<input id="procedures" placeholder="الإجراءات (Angioplasty / CABG)">

</div>

<button onclick="savePatient()">
💾 حفظ بيانات المريض
</button>

</div>

<!-- جدول المرضى -->

<div class="card">

<h3>📋 سجل المرضى</h3>

<table>

<thead>

<tr>
<th>رقم المريض</th>
<th>الاسم</th>
<th>العمر</th>
<th>التشخيص</th>
<th>ضغط الدم</th>
<th>الإجراءات</th>
</tr>

</thead>

<tbody id="patientsTable"></tbody>

</table>

</div>

</div>

<script>

let patients = JSON.parse(localStorage.getItem("patients")) || [];

function generateId(){

return "P-" + Math.floor(Math.random()*100000);

}

document.getElementById("patientId").value = generateId();

function savePatient(){

let patient = {

id:document.getElementById("patientId").value,
name:document.getElementById("fullName").value,
age:document.getElementById("age").value,
diagnosis:document.getElementById("diagnosis").value,
bloodPressure:document.getElementById("bloodPressure").value,
procedures:document.getElementById("procedures").value

};

patients.push(patient);

localStorage.setItem("patients",JSON.stringify(patients));

displayPatients();

}

function displayPatients(){

let table = document.getElementById("patientsTable");

table.innerHTML="";

patients.forEach(p=>{

table.innerHTML+=`

<tr>

<td>${p.id}</td>
<td>${p.name}</td>
<td>${p.age}</td>
<td>${p.diagnosis}</td>
<td>${p.bloodPressure}</td>
<td>${p.procedures}</td>

</tr>

`;

});

}

displayPatients();

</script>

</body>
</html>
