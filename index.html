<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام مركز القلب | تسجيل الدخول</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== الخلفية ===== */

body{
font-family:'Tajawal',sans-serif;
margin:0;
height:100vh;

background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1586773860418-d37222d8fce3");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
}

/* ===== شاشة التحميل ===== */

#loadingScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.85);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

color:white;
font-size:18px;

z-index:9999;
}

/* ECG */

#ecg{

width:80%;
height:100px;

border:2px solid #0d6efd;

margin:20px 0;

position:relative;
overflow:hidden;

background:#000;

}

.ecgLine{

position:absolute;

width:4px;
height:100%;

background:#00ff00;

left:0;

animation:ecgMove 1s linear infinite;

}

@keyframes ecgMove{

0%{left:0;}

100%{left:100%;}

}

/* ===== صندوق تسجيل الدخول ===== */

.loginBox{

background:rgba(255,255,255,0.96);

padding:45px 35px;

border-radius:20px;

width:95%;
max-width:420px;

text-align:center;

box-shadow:0 20px 60px rgba(0,0,0,0.4);

backdrop-filter:blur(8px);

display:none;

}

/* الشعار */

.logo{

width:90px;

margin-bottom:10px;

}

/* النص الرسمي */

.official{

font-size:14px;

line-height:1.6;

color:#333;

}

.ministry{

font-weight:bold;

color:#0d6efd;

}

.hospital{

font-weight:bold;

color:#198754;

}

/* عنوان النظام */

.systemTitle{

font-family:'Aref Ruqaa',serif;

font-size:26px;

margin:15px 0;

color:#0d6efd;

}

/* القلب */

.heartIcon{

font-size:55px;

color:#e60023;

margin-bottom:10px;

animation:heartBeat 1.2s infinite;

}

@keyframes heartBeat{

0%{transform:scale(1);}
20%{transform:scale(1.25);}
40%{transform:scale(1);}
60%{transform:scale(1.18);}
100%{transform:scale(1);}

}

/* الحقول */

.loginBox input{

width:100%;

padding:12px;

margin:10px 0;

border-radius:10px;

border:1px solid #ccc;

font-size:14px;

outline:none;

}

.loginBox input:focus{

border-color:#0d6efd;

box-shadow:0 0 8px rgba(13,110,253,0.4);

}

/* زر الدخول */

.loginBox button{

width:100%;

padding:12px;

background:linear-gradient(135deg,#0d6efd,#001f4d);

border:none;

color:white;

font-size:16px;

font-weight:bold;

border-radius:10px;

cursor:pointer;

}

.loginBox button:hover{

transform:scale(1.03);

}

/* رسالة الخطأ */

#error{

color:red;

margin-top:10px;

font-weight:bold;

}

/* توقيع المطور */

.developerSignature{

margin-top:20px;

font-size:14px;

font-weight:bold;

text-align:center;

background:linear-gradient(
90deg,
#ff0000,
#ff8800,
#ffee00,
#00ccff,
#0066ff,
#ff0000
);

background-size:300%;

-webkit-background-clip:text;

color:transparent;

animation:devGlow 6s linear infinite;

}

@keyframes devGlow{

0%{background-position:0%;}
100%{background-position:300%;}

}

</style>

</head>

<body>

<!-- شاشة التحميل -->

<div id="loadingScreen">

<div>
جاري تحميل بيانات المرضى...
</div>

<div id="ecg">
<div class="ecgLine"></div>
</div>

</div>


<!-- صفحة تسجيل الدخول -->

<div class="loginBox">

<img src="assets/logo.png" class="logo">

<div class="official">

<span class="ministry">
وزارة الصحة والبيئة
</span>

<br>

<span class="hospital">
هيئة مستشفى الثورة العام – إب
</span>

</div>

<div class="heartIcon">
<i class="fa-solid fa-heart-pulse"></i>
</div>

<div class="systemTitle">
نظام مركز القلب
</div>

<input type="text" id="username" placeholder="اسم المستخدم">

<input type="password" id="password" placeholder="كلمة المرور">

<button id="loginBtn">

<i class="fa-solid fa-right-to-bracket"></i>

تسجيل الدخول

</button>

<p id="error"></p>

<div class="developerSignature">

برمجة وتصميم  
<br>
D / Salah Al-ahdel

</div>

</div>


<!-- صوت القلب -->

<audio id="heartbeatSound" preload="auto">
<source src="sounds/heartbeat.mp3" type="audio/mpeg">
</audio>


<script>

/* ===== شاشة التحميل ===== */

window.addEventListener("load", function(){

setTimeout(()=>{

document.getElementById("loadingScreen").style.display="none";

document.querySelector(".loginBox").style.display="block";

},2000);

});


/* ===== تسجيل الدخول ===== */

document.getElementById("loginBtn").addEventListener("click", function(){

let user = document.getElementById("username").value;

let pass = document.getElementById("password").value;

let heartbeat = document.getElementById("heartbeatSound");

if(user === "admin" && pass === "770075098"){

/* تشغيل صوت القلب */

heartbeat.volume = 0.5;

heartbeat.play().catch(e=>console.log(e));

localStorage.setItem("loggedIn","true");

/* إيقاف الصوت بعد 30 ثانية */

setTimeout(()=>{

heartbeat.pause();

heartbeat.currentTime = 0;

},30000);


/* الانتقال للوحة التحكم */

setTimeout(()=>{

window.location.href="pages/dashboard.html";

},1000);

}

else{

document.getElementById("error").innerText="بيانات الدخول غير صحيحة";

}

});

</script>

</body>
</html>
