<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة المواعيد | نظام مركز القلب</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.8/index.global.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.8/index.global.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body{
font-family:'Tajawal',sans-serif;
margin:0;
background:#f4f7fb;
}

/* الهيدر */

header{
background:linear-gradient(135deg,#0d6efd,#001f4d);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

/* الكروت */

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
margin-bottom:20px;
}

/* الفورم */

.formGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:10px;
}

input,select{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-family:'Tajawal';
}

/* الأزرار */

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.addBtn{background:#0d6efd;color:white;}
.smsBtn{background:#198754;color:white;}
.printBtn{background:#6c757d;color:white;}

/* التقويم */

#calendar{
margin-top:20px;
}

/* الإحصائيات */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.statBox{
background:#eef3ff;
padding:20px;
border-radius:10px;
text-align:center;
font-size:18px;
}

/* بيانات المريض */

.patientInfo{
background:#f1f5ff;
padding:15px;
border-radius:10px;
margin-top:10px;
}

/* QR */

.qrBox{
text-align:center;
margin-top:20px;
}

</style>

</head>

<body>

<header>

<h2>🫀 إدارة المواعيد - مركز القلب</h2>

<button class="printBtn" onclick="window.print()">🖨 طباعة</button>

</header>

<div class="container">

<!-- حجز موعد -->

<div class="card">

<h3>➕ حجز موعد جديد</h3>

<div class="formGrid">

<select id="patientSelect" onchange="showPatientInfo()">
<option value="">اختر المريض</option>
</select>

<input type="date" id="date">

<input type="time" id="time">

<select id="service">
<option>تخطيط قلب ECG</option>
<option>إيكو القلب Echo</option>
<option>استشارة قلبية</option>
<option>فحص جهد</option>
</select>

<input type="text" id="doctor" placeholder="اسم الطبيب">

<input type="text" id="location" placeholder="الجناح / الغرفة">

</div>

<div class="patientInfo" id="patientInfo">
بيانات المريض ستظهر هنا
</div>

<br>

<button class="addBtn" onclick="addAppointment()">💾 حفظ الموعد</button>

<button class="smsBtn" onclick="sendSMS()">📱 إرسال تذكير SMS</button>

</div>

<!-- إحصائيات -->

<div class="card">

<h3>📊 إحصائيات المركز</h3>

<div class="stats">

<div class="statBox">
مواعيد اليوم
<br>
<span id="todayCount">0</span>
</div>

<div class="statBox">
إجمالي المواعيد
<br>
<span id="totalAppointments">0</span>
</div>

<div class="statBox">
عدد المرضى
<br>
<span id="totalPatients">0</span>
</div>

</div>

</div>

<!-- التقويم -->

<div class="card">

<h3>📅 تقويم المواعيد</h3>

<div id="calendar"></div>

</div>

<!-- QR -->

<div class="card qrBox">

<h3>📱 تأكيد الوصول</h3>

<canvas id="qr"></canvas>

</div>

</div>

<script>

/* تحميل البيانات */

let patients = JSON.parse(localStorage.getItem("patients")) || [];
let appointments = JSON.parse(localStorage.getItem("appointments")) || [];

let patientSelect = document.getElementById("patientSelect");

/* تعبئة المرضى */

patients.forEach((p,index)=>{

let option=document.createElement("option");

option.value=index;

option.textContent = p.id + " | " + p.name;

patientSelect.appendChild(option);

});

document.getElementById("totalPatients").innerText = patients.length;

/* عرض بيانات المريض */

function showPatientInfo(){

let index = patientSelect.value;

if(index==="") return;

let p = patients[index];

document.getElementById("patientInfo").innerHTML =

`
<b>الاسم:</b> ${p.name} <br>
<b>العمر:</b> ${p.age} <br>
<b>الجنس:</b> ${p.gender} <br>
<b>رقم المريض:</b> ${p.id}
`;

}

/* إضافة موعد */

function addAppointment(){

let index = patientSelect.value;

if(index===""){

alert("اختر المريض");

return;

}

let p = patients[index];

let appointment = {

id:"APT-"+Date.now(),

patientId:p.id,

patient:p.name,

date:document.getElementById("date").value,

time:document.getElementById("time").value,

service:document.getElementById("service").value,

doctor:document.getElementById("doctor").value,

location:document.getElementById("location").value

};

appointments.push(appointment);

localStorage.setItem("appointments",JSON.stringify(appointments));

generateQR(appointment.id);

loadCalendar();

updateStats();

alert("تم حجز الموعد بنجاح");

}

/* التقويم */

function loadCalendar(){

let calendarEl=document.getElementById("calendar");

let events = appointments.map(a=>{

return{

title:a.patient+" - "+a.service,

start:a.date+"T"+a.time

};

});

let calendar = new FullCalendar.Calendar(calendarEl,{

initialView:'dayGridMonth',

height:600,

events:events

});

calendar.render();

}

/* الإحصائيات */

function updateStats(){

let today = new Date().toISOString().split("T")[0];

let todayCount = appointments.filter(a=>a.date===today).length;

document.getElementById("todayCount").innerText = todayCount;

document.getElementById("totalAppointments").innerText = appointments.length;

}

/* QR */

function generateQR(id){

QRCode.toCanvas(document.getElementById("qr"), id);

}

/* SMS */

function sendSMS(){

alert("📱 تم إرسال تذكير للمريض بالموعد");

}

/* تشغيل النظام */

loadCalendar();
updateStats();

</script>

</body>
</html>
