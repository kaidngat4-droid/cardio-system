<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة المواعيد | نظام مركز القلب</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.8/index.global.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.8/index.global.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body{
font-family:'Tajawal',sans-serif;
margin:0;
background:#f4f7fb;
}

/* الهيدر */

header{
background:linear-gradient(135deg,#0d6efd,#001f4d);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
margin:0;
}

/* الحاوية */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* الكروت */

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
margin-bottom:20px;
}

/* الفورم */

.formGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

input,select{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-family:'Tajawal';
}

/* الأزرار */

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.addBtn{
background:#0d6efd;
color:white;
}

.smsBtn{
background:#198754;
color:white;
}

.printBtn{
background:#6c757d;
color:white;
}

/* التقويم */

#calendar{
margin-top:20px;
}

/* الإحصائيات */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.statBox{
background:#eef3ff;
padding:15px;
border-radius:10px;
text-align:center;
font-size:18px;
}

/* QR */

.qrBox{
text-align:center;
margin-top:20px;
}

</style>

</head>

<body>

<header>

<h2>🫀 إدارة المواعيد - مركز القلب</h2>

<button onclick="window.print()">🖨 طباعة</button>

</header>

<div class="container">

<!-- إضافة موعد -->

<div class="card">

<h3>➕ حجز موعد جديد</h3>

<div class="formGrid">

<select id="patientSelect">
<option value="">اختر المريض</option>
</select>

<input type="date" id="date">

<input type="time" id="time">

<select id="service">
<option>تخطيط قلب ECG</option>
<option>إيكو القلب Echo</option>
<option>استشارة قلبية</option>
<option>فحص جهد</option>
</select>

<input type="text" id="doctor" placeholder="اسم الطبيب">

<input type="text" id="location" placeholder="الجناح / الغرفة">

</div>

<br>

<button class="addBtn" onclick="addAppointment()">💾 حفظ الموعد</button>

<button class="smsBtn" onclick="sendSMS()">📱 إرسال تذكير SMS</button>

</div>

<!-- الإحصائيات -->

<div class="card">

<h3>📊 إحصائيات ضغط العيادة</h3>

<div class="stats">

<div class="statBox">
مواعيد اليوم
<br>
<span id="todayCount">0</span>
</div>

<div class="statBox">
إجمالي المواعيد
<br>
<span id="totalAppointments">0</span>
</div>

</div>

</div>

<!-- التقويم -->

<div class="card">

<h3>📅 تقويم المواعيد</h3>

<div id="calendar"></div>

</div>

<!-- QR -->

<div class="card qrBox">

<h3>📱 تأكيد الوصول</h3>

<canvas id="qr"></canvas>

</div>

</div>

<script>

/* المرضى */

let patients = JSON.parse(localStorage.getItem("patients")) || [];
let appointments = JSON.parse(localStorage.getItem("appointments")) || [];

/* تعبئة قائمة المرضى */

let patientSelect=document.getElementById("patientSelect");

patients.forEach((p,i)=>{

let option=document.createElement("option");
option.value=i;
option.textContent=p.name;

patientSelect.appendChild(option);

});

/* إضافة موعد */

function addAppointment(){

let patientIndex=patientSelect.value;
let date=document.getElementById("date").value;
let time=document.getElementById("time").value;
let service=document.getElementById("service").value;
let doctor=document.getElementById("doctor").value;
let location=document.getElementById("location").value;

if(patientIndex===""){
alert("اختر المريض");
return;
}

let appointment={

patient:patients[patientIndex].name,
date:date,
time:time,
service:service,
doctor:doctor,
location:location

};

appointments.push(appointment);

localStorage.setItem("appointments",JSON.stringify(appointments));

loadCalendar();
updateStats();

alert("تم حفظ الموعد");

}

/* التقويم */

function loadCalendar(){

let calendarEl=document.getElementById("calendar");

let events=appointments.map(a=>{

return{
title:a.patient+" - "+a.service,
start:a.date+"T"+a.time
};

});

let calendar=new FullCalendar.Calendar(calendarEl,{

initialView:'dayGridMonth',

events:events

});

calendar.render();

}

/* الإحصائيات */

function updateStats(){

let today=new Date().toISOString().split("T")[0];

let todayCount=appointments.filter(a=>a.date===today).length;

document.getElementById("todayCount").innerText=todayCount;

document.getElementById("totalAppointments").innerText=appointments.length;

}

/* SMS */

function sendSMS(){

alert("📱 تم إرسال رسالة تذكير للمريض بالموعد");

}

/* QR */

QRCode.toCanvas(document.getElementById("qr"), "Cardio-Appointment");

/* تشغيل النظام */

loadCalendar();
updateStats();

</script>

</body>
</html>
