<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تحاليل المرضى | نظام مركز القلب</title>

<link rel="stylesheet" href="../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Tajawal;
background:#f5f7fb;
margin:0;
}

/* الهيدر */

header{
background:linear-gradient(135deg,#0d6efd,#001f4d);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
margin:0;
}

/* الحاوية */

.container{
width:95%;
max-width:1200px;
margin:auto;
margin-top:20px;
}

/* صندوق */

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* جدول */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #eee;
padding:10px;
text-align:center;
}

th{
background:#0d6efd;
color:white;
}

/* المؤشرات */

.normal{
color:green;
font-weight:bold;
}

.high{
color:red;
font-weight:bold;
}

/* نموذج الإدخال */

input{
padding:8px;
margin:5px;
width:120px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
background:#0d6efd;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>🧪 تحاليل المريض</h2>

<a href="patients.html" style="color:white">العودة للمرضى</a>

</header>

<div class="container">

<!-- بيانات المريض -->

<div class="card">

<h3>بيانات المريض</h3>

<p>الاسم: <span id="pName"></span></p>
<p>العمر: <span id="pAge"></span></p>
<p>الجنس: <span id="pGender"></span></p>
<p>رقم المريض: <span id="pId"></span></p>

</div>

<!-- إدخال التحاليل -->

<div class="card">

<h3>إضافة نتائج التحاليل</h3>

<h4>أنزيمات القلب</h4>

<input id="troponin" placeholder="Troponin">
<input id="ckmb" placeholder="CK-MB">
<input id="bnp" placeholder="BNP">

<h4>بروفايل الدهون</h4>

<input id="cholesterol" placeholder="Total Cholesterol">
<input id="hdl" placeholder="HDL">
<input id="ldl" placeholder="LDL">
<input id="triglycerides" placeholder="Triglycerides">

<h4>وظائف الكلى</h4>

<input id="creatinine" placeholder="Creatinine">
<input id="urea" placeholder="Urea">

<br><br>

<button onclick="saveTest()">حفظ التحليل</button>

</div>

<!-- جدول النتائج -->

<div class="card">

<h3>نتائج التحاليل</h3>

<table>

<thead>

<tr>

<th>التاريخ</th>
<th>Troponin</th>
<th>CK-MB</th>
<th>BNP</th>
<th>Cholesterol</th>
<th>HDL</th>
<th>LDL</th>
<th>Triglycerides</th>

</tr>

</thead>

<tbody id="testsTable"></tbody>

</table>

</div>

<!-- الرسم البياني -->

<div class="card">

<h3>تطور Troponin</h3>

<canvas id="troponinChart"></canvas>

</div>

</div>

<script>

/* جلب رقم المريض من الرابط */

const params = new URLSearchParams(window.location.search)

const patientId = params.get("id")

/* جلب المرضى */

let patients = JSON.parse(localStorage.getItem("patients")) || []

const patient = patients.find(p => p.id == patientId)

if(patient){

document.getElementById("pName").innerText = patient.name
document.getElementById("pAge").innerText = patient.age
document.getElementById("pGender").innerText = patient.gender
document.getElementById("pId").innerText = patient.id

}

/* جلب التحاليل */

let tests = JSON.parse(localStorage.getItem("tests")) || []

function saveTest(){

const test = {

patientId:patientId,

date:new Date().toLocaleDateString(),

troponin:parseFloat(document.getElementById("troponin").value),

ckmb:parseFloat(document.getElementById("ckmb").value),

bnp:parseFloat(document.getElementById("bnp").value),

cholesterol:document.getElementById("cholesterol").value,

hdl:document.getElementById("hdl").value,

ldl:document.getElementById("ldl").value,

triglycerides:document.getElementById("triglycerides").value

}

tests.push(test)

localStorage.setItem("tests",JSON.stringify(tests))

loadTests()

}

function loadTests(){

const table = document.getElementById("testsTable")

table.innerHTML=""

const patientTests = tests.filter(t=>t.patientId==patientId)

let troponinData=[]
let dates=[]

patientTests.forEach(t=>{

let status = t.troponin > 0.04 ? "high":"normal"

table.innerHTML +=`

<tr>

<td>${t.date}</td>

<td class="${status}">${t.troponin}</td>

<td>${t.ckmb}</td>

<td>${t.bnp}</td>

<td>${t.cholesterol}</td>

<td>${t.hdl}</td>

<td>${t.ldl}</td>

<td>${t.triglycerides}</td>

</tr>

`

troponinData.push(t.troponin)
dates.push(t.date)

})

drawChart(dates,troponinData)

}

function drawChart(labels,data){

new Chart(document.getElementById("troponinChart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"Troponin",
data:data,
borderWidth:2
}]
}

})

}

loadTests()

</script>

</body>

</html>
