<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تحاليل القلب | نظام مركز القلب</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

.sectionTitle{

font-size:20px;
margin:20px 0;
color:#0d6efd;

}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:10px;

}

.alert{

background:#ffdddd;
padding:10px;
border-radius:6px;
color:#a10000;
margin-top:10px;

}

.normal{

background:#ddffdd;
padding:10px;
border-radius:6px;

}

</style>

</head>

<body>

<header>

<h2>🧪 تحاليل القلب</h2>

<div>

<a href="dashboard.html">لوحة التحكم</a>
<a href="patients.html">المرضى</a>
<a href="appointments.html">المواعيد</a>

</div>

</header>

<div class="container">

<h2>🧾 بيانات المريض</h2>

<div id="patientInfo"></div>

<div class="card">

<h3 class="sectionTitle">
🫀 مؤشرات القلب (Cardiac Markers)
</h3>

<div class="grid">

<input id="troponin" placeholder="Troponin I (ng/ml)">
<input id="ckmb" placeholder="CK-MB">
<input id="bnp" placeholder="BNP">
<input id="myoglobin" placeholder="Myoglobin">

</div>

</div>


<div class="card">

<h3 class="sectionTitle">
🩸 الدهون (Lipid Profile)
</h3>

<div class="grid">

<input id="cholesterol" placeholder="Total Cholesterol">

<input id="hdl" placeholder="HDL">

<input id="ldl" placeholder="LDL">

<input id="triglycerides" placeholder="Triglycerides">

</div>

</div>


<div class="card">

<h3 class="sectionTitle">
🧬 وظائف الأعضاء
</h3>

<div class="grid">

<input id="creatinine" placeholder="Creatinine">

<input id="urea" placeholder="Urea">

<input id="alt" placeholder="ALT">

<input id="ast" placeholder="AST">

</div>

</div>

<button class="addBtn" onclick="saveTest()">

💾 حفظ التحليل

</button>


<div id="medicalAlert"></div>

<div class="card">

<h3>📊 تطور التحاليل</h3>

<canvas id="testChart"></canvas>

</div>

</div>

<script src="../js/tests.js"></script>

</body>

</html>
