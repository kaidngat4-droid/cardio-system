<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>التقارير الطبية الذكية | مركز القلب</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

.analyticsGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:20px;
}

.analyticsCard{

background:white;
padding:20px;
border-radius:12px;
text-align:center;

box-shadow:0 5px 25px rgba(0,0,0,0.1);

}

.analyticsCard h3{
color:#0d6efd;
}

.chartsGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
gap:20px;
}

.chartBox{

background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 25px rgba(0,0,0,0.1);

}

.aiSection{

background:white;
padding:20px;
margin-top:20px;
border-radius:12px;
box-shadow:0 5px 25px rgba(0,0,0,0.1);

}

.alert{

background:#ffe5e5;
padding:10px;
margin:5px 0;
border-radius:6px;

}

</style>

</head>

<body>

<header>

<h2>📊 مركز تحليل بيانات القلب</h2>

<div>

<a href="dashboard.html">🏠 الرئيسية</a>

<a href="patients.html">👨‍⚕️ المرضى</a>

<a href="appointments.html">📅 المواعيد</a>

<a href="tests.html">🧪 التحاليل</a>

<a href="operations.html">🫀 العمليات</a>

<a href="pharmacy.html">💊 الصيدلية</a>

</div>

</header>


<div class="container">

<h2>📈 التحليل الطبي الذكي</h2>


<div class="analyticsGrid">

<div class="analyticsCard">
<h3>👨‍⚕️ المرضى</h3>
<p id="patientsCount"></p>
</div>

<div class="analyticsCard">
<h3>📅 المواعيد</h3>
<p id="appointmentsCount"></p>
</div>

<div class="analyticsCard">
<h3>🧪 التحاليل</h3>
<p id="testsCount"></p>
</div>

<div class="analyticsCard">
<h3>🫀 العمليات</h3>
<p id="operationsCount"></p>
</div>

<div class="analyticsCard">
<h3>💊 الوصفات</h3>
<p id="pharmacyCount"></p>
</div>

</div>


<div class="chartsGrid">

<div class="chartBox">
<h3>📈 المرضى شهرياً</h3>
<canvas id="patientsChart"></canvas>
</div>


<div class="chartBox">
<h3>🫀 انتشار أمراض القلب</h3>
<canvas id="diseaseChart"></canvas>
</div>


<div class="chartBox">
<h3>🏥 العمليات القلبية</h3>
<canvas id="operationsChart"></canvas>
</div>


<div class="chartBox">
<h3>🧪 تحليل المختبر</h3>
<canvas id="labChart"></canvas>
</div>

</div>


<div class="aiSection">

<h3>🧠 التنبيهات الطبية الذكية</h3>

<div id="aiAlerts"></div>

</div>

</div>


<script>

let patients = JSON.parse(localStorage.getItem("patients")) || [];

let appointments = JSON.parse(localStorage.getItem("appointments")) || [];

let tests = JSON.parse(localStorage.getItem("tests")) || [];

let operations = JSON.parse(localStorage.getItem("operations")) || [];

let pharmacy = JSON.parse(localStorage.getItem("prescriptions")) || [];


/* الإحصائيات */

patientsCount.innerText = patients.length;

appointmentsCount.innerText = appointments.length;

testsCount.innerText = tests.length;

operationsCount.innerText = operations.length;

pharmacyCount.innerText = pharmacy.length;


/* تنبيهات الذكاء */

let aiAlerts = document.getElementById("aiAlerts");

patients.forEach(p=>{

if(p.bloodPressure > 160){

aiAlerts.innerHTML +=
`<div class="alert">⚠ خطر ضغط مرتفع للمريض ${p.name}</div>`;

}

if(p.ldl > 160){

aiAlerts.innerHTML +=
`<div class="alert">⚠ LDL مرتفع للمريض ${p.name}</div>`;

}

});


/* المرضى */

new Chart(document.getElementById("patientsChart"),{

type:"line",

data:{
labels:["Jan","Feb","Mar","Apr","May","Jun"],
datasets:[{
label:"Patients",
data:[10,14,20,18,22,25]
}]
}

});


/* الأمراض */

new Chart(document.getElementById("diseaseChart"),{

type:"pie",

data:{
labels:["CAD","Heart Attack","Arrhythmia","Hypertension"],
datasets:[{
data:[35,20,15,30]
}]
}

});


/* العمليات */

new Chart(document.getElementById("operationsChart"),{

type:"bar",

data:{
labels:["Angioplasty","CABG","Pacemaker"],
datasets:[{
data:[12,8,6]
}]
}

});


/* المختبر */

new Chart(document.getElementById("labChart"),{

type:"bar",

data:{
labels:["Troponin","LDL","HDL","Triglycerides"],
datasets:[{
data:[4,18,10,8]
}]
}

});

</script>
  <script src="../js/reports.js"></script>

</body>

</html>
