<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة المرضى | مركز القلب</title>

<!-- الخطوط -->
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<!-- أيقونات -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Tajawal','Aref Ruqaa',sans-serif;
margin:0;
background:#f4f6f9;
}

/* ===== الهيدر ===== */

header{

background:linear-gradient(135deg,#0d6efd,#001f4d);
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;

}

header h2{
margin:0;
font-size:20px;
}

header a, header button{

background:white;
color:#0d6efd;
padding:8px 12px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
text-decoration:none;
margin-left:5px;

}


/* ===== الحاوية ===== */

.container{

width:95%;
max-width:1000px;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);

}


/* ===== العناوين ===== */

.container h3{

color:#0d6efd;
margin-bottom:15px;

}


/* ===== الحقول ===== */

.container input,
.container select{

width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;

}

.container input:focus,
.container select:focus{

border-color:#0d6efd;
box-shadow:0 0 8px rgba(13,110,253,0.3);
outline:none;

}


/* ===== زر الإضافة ===== */

button.addBtn{

background:linear-gradient(135deg,#0d6efd,#084298);
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
padding:12px;
margin-top:10px;

}

button.addBtn:hover{

transform:scale(1.02);

}


/* ===== الجدول ===== */

table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

th, td{

padding:10px;
text-align:center;
border:1px solid #ddd;

}

th{

background:#0d6efd;
color:white;

}

tr:nth-child(even){
background:#f8f9fa;
}

tr:hover{
background:#e9f0ff;
}


/* ===== زر الحذف ===== */

button.deleteBtn{

background:#dc3545;
color:white;
border:none;
border-radius:6px;
padding:6px 10px;
cursor:pointer;

}

button.deleteBtn:hover{

background:#b02a37;

}


/* ===== الموبايل ===== */

@media(max-width:768px){

.container{
padding:15px;
}

table th, table td{
font-size:13px;
padding:8px;
}

}

</style>

</head>

<body>

<!-- ===== الهيدر ===== -->

<header>

<h2>
<i class="fa-solid fa-heart-pulse"></i>
نظام مركز القلب
</h2>

<div>

<a href="dashboard.html">
<i class="fa-solid fa-house"></i>
لوحة التحكم
</a>

<button onclick="logout()">
<i class="fa-solid fa-right-from-bracket"></i>
تسجيل خروج
</button>

</div>

</header>


<!-- ===== إضافة مريض ===== -->

<div class="container">

<h3>
<i class="fa-solid fa-user-plus"></i>
إضافة مريض جديد
</h3>

<input type="text" id="name" placeholder="اسم المريض">

<input type="number" id="age" placeholder="العمر">

<select id="gender">

<option value="ذكر">ذكر</option>
<option value="أنثى">أنثى</option>

</select>

<input type="text" id="phone" placeholder="رقم الهاتف">

<button class="addBtn" onclick="addPatient()">

<i class="fa-solid fa-plus"></i>
إضافة مريض

</button>

</div>


<!-- ===== قائمة المرضى ===== -->

<div class="container">

<h3>
<i class="fa-solid fa-users"></i>
قائمة المرضى
</h3>

<table>

<thead>

<tr>

<th>الاسم</th>
<th>العمر</th>
<th>الجنس</th>
<th>الهاتف</th>
<th>حذف</th>

</tr>

</thead>

<tbody id="patientsTable">

</tbody>

</table>

</div>


<script>

/* حماية الصفحة */

if(localStorage.getItem("loggedIn") !== "true"){

alert("يرجى تسجيل الدخول");

window.location.href="../index.html";

}

</script>

<script src="../js/patients.js"></script>

</body>
</html>
