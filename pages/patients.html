<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة المرضى | نظام مركز القلب</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<h2>🫀 نظام مركز القلب</h2>

<div>
<span id="currentUser"></span>

<a href="dashboard.html">📊 لوحة التحكم</a>
<a href="appointments.html">📅 المواعيد</a>
<a href="tests.html">🧪 التحاليل</a>
<a href="operations.html">🫀 العمليات</a>

<button onclick="logout()">🚪 خروج</button>
</div>
</header>

<div class="container">

<h2>👨‍⚕️ إدارة المرضى</h2>

<!-- إضافة مريض -->
<div class="card">

<h3>➕ تسجيل مريض جديد</h3>

<div class="grid">

<input id="patientId" readonly>
<input id="name" placeholder="الاسم الكامل">
<input id="nationalId" placeholder="الرقم الوطني">
<input id="age" placeholder="العمر">

<select id="gender">
<option value="">الجنس</option>
<option>ذكر</option>
<option>أنثى</option>
</select>

<select id="bloodType">
<option value="">فصيلة الدم</option>
<option>A+</option>
<option>O+</option>
<option>B+</option>
<option>AB+</option>
</select>

<input id="phone" placeholder="رقم الهاتف">
<input id="diagnosis" placeholder="تشخيص القلب">
<input id="bloodPressure" placeholder="ضغط الدم">

</div>

<button class="addBtn" onclick="addPatient()">💾 حفظ المريض</button>

</div>

<!-- البحث -->
<input id="search" placeholder="🔍 بحث..." onkeyup="searchPatient()">

<!-- جدول -->
<div class="card">

<h3>📋 سجل المرضى</h3>

<table>
<thead>
<tr>
<th>ID</th>
<th>الاسم</th>
<th>العمر</th>
<th>التشخيص</th>
<th>ملف</th>
<th>مواعيد</th>
<th>تحاليل</th>
<th>عمليات</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="patientsTable"></tbody>

</table>

</div>

<!-- الملف الطبي -->
<div class="card" id="patientProfile" style="display:none">

<h3>🧾 الملف الطبي المتكامل</h3>

<div id="profileContent"></div>

<h4>📊 ضغط الدم</h4>
<canvas id="patientChart"></canvas>

<h4>📅 المواعيد</h4>
<ul id="patientAppointments"></ul>

<h4>🧪 التحاليل</h4>
<ul id="patientTests"></ul>

<h4>🫀 العمليات</h4>
<ul id="patientOperations"></ul>

</div>

</div>

<script src="../js/app.js"></script>

<script>

/* البيانات */

let patients = JSON.parse(localStorage.getItem("patients")) || [];
let appointments = JSON.parse(localStorage.getItem("appointments")) || [];
let tests = JSON.parse(localStorage.getItem("tests")) || [];
let operations = JSON.parse(localStorage.getItem("operations")) || [];

/* ID */

function generateId(){
return "P-" + Date.now();
}

document.getElementById("patientId").value = generateId();

/* إضافة */

function addPatient(){

let name = document.getElementById("name").value.trim();

if(name === ""){
alert("⚠ أدخل الاسم");
return;
}

let p = {
id: document.getElementById("patientId").value,
name: name,
age: document.getElementById("age").value,
nationalId: document.getElementById("nationalId").value,
gender: document.getElementById("gender").value,
bloodType: document.getElementById("bloodType").value,
phone: document.getElementById("phone").value,
diagnosis: document.getElementById("diagnosis").value,
bloodPressure: document.getElementById("bloodPressure").value,

/* AI */
ldl:"",
troponin:"",
ecg:""
};

patients.push(p);

localStorage.setItem("patients", JSON.stringify(patients));

alert("✅ تم حفظ المريض");

document.getElementById("patientId").value = generateId();

displayPatients();
clearForm();
}

/* عرض */

function displayPatients(){

let table = document.getElementById("patientsTable");
table.innerHTML="";

patients.forEach((p,i)=>{

table.innerHTML+=`
<tr>
<td>${p.id}</td>
<td>${p.name}</td>
<td>${p.age}</td>
<td>${p.diagnosis}</td>

<td><button onclick="viewPatient(${i})">👁</button></td>

<td><button onclick="goAppointments('${p.id}')">📅</button></td>
<td><button onclick="goTests('${p.id}')">🧪</button></td>
<td><button onclick="goOperations('${p.id}')">🫀</button></td>

<td><button onclick="deletePatient(${i})">🗑</button></td>
</tr>
`;
});
}

/* حذف */

function deletePatient(i){
patients.splice(i,1);
localStorage.setItem("patients", JSON.stringify(patients));
displayPatients();
}

/* البحث */

function searchPatient(){

let val = document.getElementById("search").value.toLowerCase();

document.querySelectorAll("#patientsTable tr").forEach(r=>{
r.style.display =
r.innerText.toLowerCase().includes(val) ? "" : "none";
});
}

/* الملف الكامل */

function viewPatient(i){

let p = patients[i];

document.getElementById("patientProfile").style.display="block";

document.getElementById("profileContent").innerHTML = `
<p>👤 ${p.name}</p>
<p>🆔 ${p.id}</p>
<p>📞 ${p.phone}</p>
<p>🩸 ${p.bloodType}</p>
<p>💔 ${p.diagnosis}</p>
`;

/* مواعيد */

patientAppointments.innerHTML="";
appointments.filter(a=>a.patientId===p.id)
.forEach(a=>{
patientAppointments.innerHTML+=`<li>${a.date} - ${a.service}</li>`;
});

/* تحاليل */

patientTests.innerHTML="";
tests.filter(t=>t.patientId===p.id)
.forEach(t=>{
patientTests.innerHTML+=`<li>${t.type} : ${t.result}</li>`;
});

/* عمليات */

patientOperations.innerHTML="";
operations.filter(o=>o.patientId===p.id)
.forEach(o=>{
patientOperations.innerHTML+=`<li>${o.procedure}</li>`;
});

/* رسم */

new Chart(document.getElementById("patientChart"),{
type:"line",
data:{
labels:["زيارة 1","زيارة 2","زيارة 3"],
datasets:[{
label:"ضغط الدم",
data:[
parseInt(p.bloodPressure)||120,
140,
160
]
}]
}
});

}

/* ربط */

function goAppointments(id){
localStorage.setItem("selectedPatient", id);
window.location="appointments.html";
}

function goTests(id){
localStorage.setItem("selectedPatient", id);
window.location="tests.html";
}

function goOperations(id){
localStorage.setItem("selectedPatient", id);
window.location="operations.html";
}

/* تنظيف */

function clearForm(){
document.querySelectorAll("input").forEach(i=>{
if(i.id !== "patientId") i.value="";
});
}

/* تشغيل */

displayPatients();

</script>

</body>
</html>
