<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة المرضى | نظام مركز القلب</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h2>🫀 نظام مركز القلب</h2>

<div>

<a href="dashboard.html"><i class="fa fa-chart-line"></i> لوحة التحكم</a>

<a href="appointments.html"><i class="fa fa-calendar-check"></i> المواعيد</a>

<a href="tests.html"><i class="fa fa-flask"></i> التحاليل</a>

<a href="pharmacy.html"><i class="fa fa-pills"></i> الصيدلية</a>

<a href="operations.html"><i class="fa fa-heart-pulse"></i> العمليات</a>

<button onclick="logout()">تسجيل خروج</button>

</div>

</header>

<div class="container">

<h2>👨‍⚕️ إدارة المرضى</h2>

<!-- إضافة مريض -->

<div class="card">

<h3>➕ تسجيل مريض جديد</h3>

<div class="grid">

<input id="name" placeholder="الاسم الكامل">

<input id="nationalId" placeholder="الرقم الوطني">

<input id="age" placeholder="العمر">

<select id="gender">

<option value="">الجنس</option>
<option>ذكر</option>
<option>أنثى</option>

</select>

<select id="bloodType">

<option value="">فصيلة الدم</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>O+</option>
<option>O-</option>

</select>

<input id="phone" placeholder="رقم الهاتف">

<input id="diagnosis" placeholder="تشخيص القلب">

<input id="bloodPressure" placeholder="ضغط الدم">

</div>

<button class="addBtn" onclick="addPatient()">

💾 حفظ المريض

</button>

</div>

<!-- البحث -->

<input id="search" placeholder="🔍 بحث عن مريض..." onkeyup="searchPatient()">

<!-- جدول المرضى -->

<div class="card">

<h3>📋 سجل المرضى</h3>

<table>

<thead>

<tr>

<th>الرقم</th>
<th>الاسم</th>
<th>العمر</th>
<th>الجنس</th>
<th>فصيلة الدم</th>
<th>التشخيص</th>
<th>عرض الملف</th>
<th>حذف</th>

</tr>

</thead>

<tbody id="patientsTable"></tbody>

</table>

</div>


<!-- الملف الطبي -->

<div class="card" id="patientProfile" style="display:none">

<h3>🧾 الملف الطبي للمريض</h3>

<div id="profileContent"></div>

<canvas id="patientChart"></canvas>

</div>

</div>

<script src="../js/patients.js"></script>

</body>

</html>
