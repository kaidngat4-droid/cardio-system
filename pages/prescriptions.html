<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الوصفات الطبية | نظام مركز القلب</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

.container{

width:95%;
max-width:1200px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);

}

.formGrid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;

}

table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

th,td{

border:1px solid #ddd;
padding:8px;
text-align:center;

}

th{

background:#0d6efd;
color:white;

}

button{

padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;

}

.addBtn{

background:#0d6efd;
color:white;

}

.printBtn{

background:#198754;
color:white;

}

.deleteBtn{

background:#dc3545;
color:white;

}

</style>

</head>

<body>

<header>

<h2>

<i class="fa-solid fa-file-medical"></i>
نظام الوصفات الطبية

</h2>

<a href="dashboard.html">🏠 لوحة التحكم</a>

</header>


<div class="container">

<h3>➕ إنشاء وصفة طبية</h3>

<div class="formGrid">

<select id="patientSelect"></select>

<select id="drugSelect"></select>

<input type="text" id="dosage" placeholder="الجرعة">

<input type="number" id="frequency" placeholder="عدد المرات يومياً">

<input type="number" id="duration" placeholder="مدة العلاج (أيام)">

<input type="text" id="instructions" placeholder="تعليمات للمريض">

<input type="text" id="doctor" placeholder="اسم الطبيب">

</div>

<br>

<button class="addBtn" onclick="addPrescription()">

💾 حفظ الوصفة

</button>

</div>


<div class="container">

<h3>📋 سجل الوصفات الطبية</h3>

<table>

<thead>

<tr>

<th>رقم الوصفة</th>
<th>المريض</th>
<th>الدواء</th>
<th>الجرعة</th>
<th>المرات</th>
<th>المدة</th>
<th>الطبيب</th>
<th>التاريخ</th>
<th>طباعة</th>
<th>حذف</th>

</tr>

</thead>

<tbody id="prescriptionTable"></tbody>

</table>

</div>


<script>

/* البيانات */

let patients = JSON.parse(localStorage.getItem("patients")) || [];
let drugs = JSON.parse(localStorage.getItem("drugs")) || [];
let prescriptions = JSON.parse(localStorage.getItem("prescriptions")) || [];


/* تحميل المرضى */

function loadPatients(){

let select=document.getElementById("patientSelect");

select.innerHTML="<option>اختر المريض</option>";

patients.forEach((p,i)=>{

select.innerHTML+=`<option value="${i}">${p.name} - ${p.id}</option>`;

});

}

loadPatients();


/* تحميل الأدوية */

function loadDrugs(){

let select=document.getElementById("drugSelect");

select.innerHTML="<option>اختر الدواء</option>";

drugs.forEach((d,i)=>{

select.innerHTML+=`<option value="${i}">${d.name}</option>`;

});

}

loadDrugs();


/* توليد رقم وصفة */

function generateRx(){

return "RX-" + Date.now();

}


/* إضافة وصفة */

function addPrescription(){

let pIndex=document.getElementById("patientSelect").value;
let dIndex=document.getElementById("drugSelect").value;

let dosage=document.getElementById("dosage").value;
let frequency=document.getElementById("frequency").value;
let duration=document.getElementById("duration").value;
let instructions=document.getElementById("instructions").value;
let doctor=document.getElementById("doctor").value;

if(!dosage || !frequency){

alert("يرجى تعبئة البيانات");

return;

}

let prescription={

id:generateRx(),

patient:patients[pIndex].name,

patientId:patients[pIndex].id,

drug:drugs[dIndex].name,

dosage:dosage,

frequency:frequency,

duration:duration,

instructions:instructions,

doctor:doctor,

date:new Date().toLocaleDateString()

};

/* تقليل المخزون */

if(drugs[dIndex].quantity>0){

drugs[dIndex].quantity--;

localStorage.setItem("drugs",JSON.stringify(drugs));

}

prescriptions.push(prescription);

localStorage.setItem("prescriptions",JSON.stringify(prescriptions));

displayPrescriptions();

}


/* عرض الوصفات */

function displayPrescriptions(){

let table=document.getElementById("prescriptionTable");

table.innerHTML="";

prescriptions.forEach((p,i)=>{

table.innerHTML+=`

<tr>

<td>${p.id}</td>
<td>${p.patient}</td>
<td>${p.drug}</td>
<td>${p.dosage}</td>
<td>${p.frequency}</td>
<td>${p.duration}</td>
<td>${p.doctor}</td>
<td>${p.date}</td>

<td>

<button class="printBtn" onclick="window.print()">

🖨

</button>

</td>

<td>

<button class="deleteBtn" onclick="deletePrescription(${i})">

🗑

</button>

</td>

</tr>

`;

});

}

displayPrescriptions();


/* حذف وصفة */

function deletePrescription(index){

prescriptions.splice(index,1);

localStorage.setItem("prescriptions",JSON.stringify(prescriptions));

displayPrescriptions();

}

</script>
  <script src="../js/prescriptions.js"></script>

</body>
</html>
