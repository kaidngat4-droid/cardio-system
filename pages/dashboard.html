<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة التحكم | نظام مركز القلب</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/dashboard.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h2>🫀 نظام مركز القلب</h2>

<div>

<a href="patients.html"><i class="fa fa-user-injured"></i> المرضى</a>

<a href="appointments.html"><i class="fa fa-calendar-check"></i> المواعيد</a>

<a href="tests.html"><i class="fa fa-flask"></i> التحاليل</a>

<a href="operations.html"><i class="fa fa-heart-pulse"></i> العمليات</a>

<a href="pharmacy.html"><i class="fa fa-pills"></i> الصيدلية</a>

<a href="reports.html"><i class="fa fa-chart-line"></i> التقارير</a>

<button onclick="logout()">تسجيل خروج</button>

</div>

</header>

<div class="container">

<h2>📊 لوحة التحكم الطبية</h2>

<div class="dashboard">

<div class="card">

<h3><i class="fa fa-user-injured icon3d"></i> المرضى</h3>

<p id="patientsCount">0</p>

</div>

<div class="card">

<h3><i class="fa fa-calendar-check icon3d"></i> مواعيد اليوم</h3>

<p id="todayAppointments">0</p>

</div>

<div class="card">

<h3><i class="fa fa-flask icon3d"></i> التحاليل</h3>

<p id="testsCount">0</p>

</div>

<div class="card">

<h3><i class="fa fa-heart-pulse icon3d"></i> العمليات</h3>

<p id="operationsCount">0</p>

</div>

<div class="card">

<h3><i class="fa fa-pills icon3d"></i> الأدوية المصروفة</h3>

<p id="pharmacyCount">0</p>

</div>

</div>


<!-- الرسوم البيانية -->

<div class="charts">

<div class="chartBox">

<h3>📈 عدد المرضى شهرياً</h3>

<canvas id="patientsChart"></canvas>

</div>

<div class="chartBox">

<h3>🫀 أمراض القلب</h3>

<canvas id="diseaseChart"></canvas>

</div>

</div>


<!-- آخر المرضى -->

<div class="recent">

<h3>🧾 آخر المرضى المسجلين</h3>

<table>

<thead>

<tr>

<th>الرقم</th>

<th>الاسم</th>

<th>العمر</th>

<th>التشخيص</th>

</tr>

</thead>

<tbody id="recentPatients"></tbody>

</table>

</div>


<!-- التنبيهات -->

<div class="alerts">

<h3>⚠ التنبيهات الطبية</h3>

<ul id="alertsList"></ul>

</div>

</div>

<script src="../js/app.js"></script>

<script>

let patients = JSON.parse(localStorage.getItem("patients")) || [];

let appointments = JSON.parse(localStorage.getItem("appointments")) || [];

let tests = JSON.parse(localStorage.getItem("tests")) || [];

let operations = JSON.parse(localStorage.getItem("operations")) || [];

let pharmacy = JSON.parse(localStorage.getItem("pharmacy")) || [];


/* الإحصائيات */

document.getElementById("patientsCount").innerText = patients.length;

document.getElementById("testsCount").innerText = tests.length;

document.getElementById("operationsCount").innerText = operations.length;

document.getElementById("pharmacyCount").innerText = pharmacy.length;


/* مواعيد اليوم */

let today = new Date().toISOString().split("T")[0];

let todayCount = appointments.filter(a => a.date === today).length;

document.getElementById("todayAppointments").innerText = todayCount;


/* آخر المرضى */

let table = document.getElementById("recentPatients");

patients.slice(-5).reverse().forEach(p => {

table.innerHTML += `

<tr>

<td>${p.id}</td>

<td>${p.name}</td>

<td>${p.age}</td>

<td>${p.diagnosis}</td>

</tr>

`;

});


/* التنبيهات */

let alerts = document.getElementById("alertsList");

patients.forEach(p => {

if(p.bloodPressure > 160){

alerts.innerHTML += `<li>⚠ ضغط مرتفع للمريض ${p.name}</li>`;

}

});


/* رسم بياني المرضى */

new Chart(document.getElementById("patientsChart"), {

type: "bar",

data: {

labels:["يناير","فبراير","مارس","أبريل","مايو","يونيو"],

datasets:[{

label:"المرضى",

data:[5,8,6,9,12,10]

}]

}

});


/* أمراض القلب */

new Chart(document.getElementById("diseaseChart"), {

type:"pie",

data:{

labels:["تصلب الشرايين","جلطة قلبية","عدم انتظام ضربات القلب","ضغط الدم"],

datasets:[{

data:[30,20,15,35]

}]

}

});

</script>

</body>

</html>
