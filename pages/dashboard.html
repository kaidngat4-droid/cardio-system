<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة التحكم Pro | مركز القلب</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.8/index.global.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== عام ===== */

body{
font-family:'Tajawal';
margin:0;
background:#f4f6f9;
transition:0.3s;
}

.dark{
background:#0f172a;
color:white;
}

/* ===== الهيدر ===== */

header{
background:linear-gradient(135deg,#0d6efd,#001f4d);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
flex-wrap:wrap;
align-items:center;
}

.nav a, .nav button{
background:white;
color:#0d6efd;
padding:6px 10px;
margin:3px;
border-radius:6px;
border:none;
cursor:pointer;
text-decoration:none;
font-weight:bold;
}

#currentUser{
margin-left:10px;
font-weight:bold;
}

/* ===== المحتوى ===== */

.container{
width:95%;
margin:auto;
padding:20px;
}

/* ===== البطاقات ===== */

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.dark .card{
background:#1e293b;
}

.card h3{
color:#0d6efd;
}

/* ===== أزرار سريعة ===== */

.quick{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin:20px 0;
}

.quick button{
padding:10px;
border:none;
border-radius:8px;
background:#0d6efd;
color:white;
cursor:pointer;
}

/* ===== التقويم ===== */

#calendar{
background:white;
padding:10px;
border-radius:10px;
}

.dark #calendar{
background:#1e293b;
}

/* ===== التنبيهات ===== */

.alerts{
background:#fff3cd;
padding:15px;
border-radius:10px;
margin-top:20px;
}

.alerts li{
margin:5px 0;
font-weight:bold;
}

/* ===== التوقيع ===== */

.dev{
text-align:center;
margin-top:20px;
background:linear-gradient(45deg,red,orange,yellow,cyan,blue,magenta);
-webkit-background-clip:text;
color:transparent;
animation:move 6s linear infinite;
}

@keyframes move{
0%{background-position:0%}
100%{background-position:400%}
}

</style>
</head>

<body>

<header>

<h2>🫀 مركز القلب - Pro</h2>

<div class="nav">

<span id="currentUser"></span>

<a href="patients.html">👤 المرضى</a>
<a href="appointments.html">📅 المواعيد</a>
<a href="tests.html">🧪 التحاليل</a>
<a href="operations.html" id="operationsLink">🫀 العمليات</a>
<a href="pharmacy.html">💊 الصيدلية</a>
<a href="reports.html">📊 التقارير</a>

<button onclick="toggleDark()">🌙</button>
<button onclick="logout()">🚪</button>

</div>

</header>

<div class="container">

<h2>📊 لوحة التحكم الذكية</h2>

<!-- إحصائيات -->

<div class="dashboard">

<div class="card"><h3>👤 المرضى</h3><p id="patientsCount">0</p></div>
<div class="card"><h3>📅 اليوم</h3><p id="todayAppointments">0</p></div>
<div class="card"><h3>🧪 التحاليل</h3><p id="testsCount">0</p></div>
<div class="card"><h3>🫀 العمليات</h3><p id="operationsCount">0</p></div>

</div>

<!-- أزرار -->

<div class="quick">
<button onclick="go('patients.html')">➕ مريض</button>
<button onclick="go('appointments.html')">📅 موعد</button>
<button onclick="go('tests.html')">🧪 تحليل</button>
<button onclick="go('operations.html')">🫀 عملية</button>
</div>

<!-- رسم -->

<canvas id="chart"></canvas>

<!-- تقويم -->

<div id="calendar"></div>

<!-- تنبيهات -->

<div class="alerts">
<h3>⚠ التنبيهات الطبية</h3>
<ul id="alertsList"></ul>
</div>

<div class="dev">
برمجة وتصميم D / Salah Al-ahdel
</div>

</div>

<script>

/* ===== حماية ===== */
if(localStorage.getItem("loggedIn") !== "true"){
location.href="../index.html";
}

/* ===== المستخدم ===== */
document.getElementById("currentUser").innerText =
"👤 " + (localStorage.getItem("currentUser") || "");

/* ===== الصلاحيات ===== */
let role = localStorage.getItem("userRole");

/* إخفاء العمليات للممرض */
if(role === "nurse"){
document.getElementById("operationsLink").style.display="none";
}

/* ===== البيانات ===== */
let patients = JSON.parse(localStorage.getItem("patients")) || [];
let appointments = JSON.parse(localStorage.getItem("appointments")) || [];
let tests = JSON.parse(localStorage.getItem("tests")) || [];
let operations = JSON.parse(localStorage.getItem("operations")) || [];

/* ===== الإحصائيات ===== */

patientsCount.innerText = patients.length;
testsCount.innerText = tests.length;
operationsCount.innerText = operations.length;

let today = new Date().toISOString().split("T")[0];

todayAppointments.innerText =
appointments.filter(a=>a.date===today).length;

/* ===== الرسم ===== */

new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["مرضى","تحاليل","عمليات"],
datasets:[{
label:"إحصائيات النظام",
data:[patients.length,tests.length,operations.length]
}]
}
});

/* ===== التقويم ===== */

let calendar = new FullCalendar.Calendar(document.getElementById("calendar"),{

initialView:'dayGridMonth',

events:[
...appointments.map(a=>({
title:"📅 " + a.patient + " - " + a.time,
start:a.date + "T" + a.time
})),

...operations.map(o=>({
title:"🫀 " + o.patient + " - " + o.time,
start:o.date + "T" + o.time
}))
]

});

calendar.render();

/* ===== التنبيهات ===== */

function loadAlerts(){

alertsList.innerHTML = "";

patients.forEach(p=>{

if(p.bloodPressure && parseInt(p.bloodPressure) > 160){
alertsList.innerHTML += `<li>⚠ ضغط مرتفع: ${p.name}</li>`;
}

if(p.ldl && parseInt(p.ldl) > 130){
alertsList.innerHTML += `<li>⚠ كوليسترول مرتفع: ${p.name}</li>`;
}

});

}

loadAlerts();

/* ===== الوضع الليلي ===== */

function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark",document.body.classList.contains("dark"));
}

if(localStorage.getItem("dark")==="true"){
document.body.classList.add("dark");
}

/* ===== التنقل ===== */

function go(page){
window.location = page;
}

/* ===== تسجيل خروج ===== */

function logout(){
localStorage.clear();
location.href="../index.html";
}

</script>

</body>
</html>
