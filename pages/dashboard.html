<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة التحكم Ultra Pro | مركز القلب</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.8/index.global.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== عام ===== */
body{
font-family:'Tajawal';
margin:0;
background:#f4f6f9;
transition:0.3s;
}

.dark{
background:#0f172a;
color:white;
}

/* ===== الهيدر ===== */
header{
background:linear-gradient(135deg,#0d6efd,#001f4d);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
flex-wrap:wrap;
align-items:center;
}

.nav a, .nav button{
background:white;
color:#0d6efd;
padding:6px 10px;
margin:3px;
border-radius:6px;
border:none;
cursor:pointer;
text-decoration:none;
font-weight:bold;
}

#currentUser{
font-weight:bold;
}

/* ===== الحاوية ===== */
.container{
width:95%;
margin:auto;
padding:20px;
}

/* ===== الإحصائيات ===== */
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.dark .card{
background:#1e293b;
}

/* ===== الأقسام الاحترافية ===== */
.sections{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin:25px 0;
}

.sectionCard{
padding:20px;
border-radius:15px;
color:white;
cursor:pointer;
transition:0.3s;
text-align:center;
}

.sectionCard:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

.sectionCard i{font-size:30px;}
.sectionCard p{font-size:22px;font-weight:bold;}

/* ألوان */
.patients{background:linear-gradient(135deg,#0d6efd,#4dabf7);}
.appointments{background:linear-gradient(135deg,#20c997,#0ca678);}
.tests{background:linear-gradient(135deg,#fd7e14,#f59f00);}
.operations{background:linear-gradient(135deg,#dc3545,#c92a2a);}
.pharmacy{background:linear-gradient(135deg,#6f42c1,#7950f2);}
.reports{background:linear-gradient(135deg,#343a40,#495057);}

/* ===== التقويم ===== */
#calendar{
background:white;
padding:10px;
border-radius:10px;
}
.dark #calendar{background:#1e293b;}

/* ===== التنبيهات ===== */
.alerts{
background:#fff3cd;
padding:15px;
border-radius:10px;
margin-top:20px;
}

.dark .alerts{
background:#3a2e05;
}

/* ===== توقيع ===== */
.dev{
text-align:center;
margin-top:20px;
background:linear-gradient(45deg,red,orange,yellow,cyan,blue,magenta);
-webkit-background-clip:text;
color:transparent;
animation:move 6s linear infinite;
}

@keyframes move{
0%{background-position:0%}
100%{background-position:400%}
}

</style>
</head>

<body>

<header>

<h2>🫀 مركز القلب Ultra</h2>

<div class="nav">
<span id="currentUser"></span>

<a href="patients.html">👤 المرضى</a>
<a href="appointments.html">📅 المواعيد</a>
<a href="tests.html">🧪 التحاليل</a>
<a href="operations.html" id="operationsLink">🫀 العمليات</a>
<a href="pharmacy.html">💊 الصيدلية</a>
<a href="reports.html">📊 التقارير</a>

<button onclick="toggleDark()">🌙</button>
<button onclick="logout()">🚪</button>
</div>

</header>

<div class="container">

<h2>📊 لوحة التحكم الذكية</h2>

<!-- إحصائيات -->
<div class="dashboard">
<div class="card"><h3>👤 المرضى</h3><p id="patientsCount">0</p></div>
<div class="card"><h3>📅 اليوم</h3><p id="todayAppointments">0</p></div>
<div class="card"><h3>🧪 التحاليل</h3><p id="testsCount">0</p></div>
<div class="card"><h3>🫀 العمليات</h3><p id="operationsCount">0</p></div>
</div>

<!-- أقسام -->
<div class="sections">

<div class="sectionCard patients" onclick="go('patients.html')">
<i class="fa-solid fa-user-injured"></i>
<h3>المرضى</h3>
<p id="patientsCount2">0</p>
</div>

<div class="sectionCard appointments" onclick="go('appointments.html')">
<i class="fa-solid fa-calendar-check"></i>
<h3>المواعيد</h3>
<p id="appointmentsCount">0</p>
</div>

<div class="sectionCard tests" onclick="go('tests.html')">
<i class="fa-solid fa-vial"></i>
<h3>التحاليل</h3>
<p id="testsCount2">0</p>
</div>

<div class="sectionCard operations" onclick="go('operations.html')">
<i class="fa-solid fa-heart-pulse"></i>
<h3>العمليات</h3>
<p id="operationsCount2">0</p>
</div>

<div class="sectionCard pharmacy" onclick="go('pharmacy.html')">
<i class="fa-solid fa-pills"></i>
<h3>الصيدلية</h3>
<p id="pharmacyCount2">0</p>
</div>

<div class="sectionCard reports" onclick="go('reports.html')">
<i class="fa-solid fa-chart-line"></i>
<h3>التقارير</h3>
<p>📊</p>
</div>

</div>

<!-- Chart -->
<canvas id="chart"></canvas>

<!-- Calendar -->
<div id="calendar"></div>

<!-- Alerts -->
<div class="alerts">
<h3>⚠ التنبيهات الطبية</h3>
<ul id="alertsList"></ul>
</div>

<div class="dev">برمجة D / Salah</div>

</div>

<script>

/* حماية */
if(localStorage.getItem("loggedIn") !== "true"){
location.href="../index.html";
}

/* المستخدم */
currentUser.innerText = "👤 " + (localStorage.getItem("currentUser")||"");

/* صلاحيات */
let role = localStorage.getItem("userRole");
if(role==="nurse"){
operationsLink.style.display="none";
}

/* بيانات */
let patients = JSON.parse(localStorage.getItem("patients"))||[];
let appointments = JSON.parse(localStorage.getItem("appointments"))||[];
let tests = JSON.parse(localStorage.getItem("tests"))||[];
let operations = JSON.parse(localStorage.getItem("operations"))||[];
let pharmacy = JSON.parse(localStorage.getItem("pharmacy"))||[];

/* إحصائيات */
patientsCount.innerText = patients.length;
testsCount.innerText = tests.length;
operationsCount.innerText = operations.length;
patientsCount2.innerText = patients.length;
appointmentsCount.innerText = appointments.length;
testsCount2.innerText = tests.length;
operationsCount2.innerText = operations.length;
pharmacyCount2.innerText = pharmacy.length;

let today=new Date().toISOString().split("T")[0];
todayAppointments.innerText=appointments.filter(a=>a.date===today).length;

/* Chart */
new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["مرضى","تحاليل","عمليات"],
datasets:[{data:[patients.length,tests.length,operations.length]}]
}
});

/* Calendar */
let calendar=new FullCalendar.Calendar(document.getElementById("calendar"),{
initialView:'dayGridMonth',
events:[
...appointments.map(a=>({title:a.patient+" "+a.time,start:a.date+"T"+a.time})),
...operations.map(o=>({title:o.patient,start:o.date+"T"+o.time}))
]
});
calendar.render();

/* Alerts */
alertsList.innerHTML="";
patients.forEach(p=>{
if(p.bloodPressure>160){
alertsList.innerHTML+=`<li>⚠ ضغط مرتفع: ${p.name}</li>`;
}
});

/* Dark */
function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark",document.body.classList.contains("dark"));
}
if(localStorage.getItem("dark")==="true"){
document.body.classList.add("dark");
}

/* Nav */
function go(p){location=p;}
function logout(){localStorage.clear();location="../index.html";}

</script>

</body>
</html>
