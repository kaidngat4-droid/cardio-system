<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>العمليات القلبية | نظام مركز القلب</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.success{
background:#e7ffe7;
padding:10px;
border-radius:6px;
}

.danger{
background:#ffe7e7;
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<header>

<h2>🫀 نظام العمليات القلبية</h2>

<div>

<a href="dashboard.html">لوحة التحكم</a>

<a href="patients.html">المرضى</a>

<a href="tests.html">التحاليل</a>

<a href="appointments.html">المواعيد</a>

</div>

</header>

<div class="container">

<h2>➕ تسجيل عملية قلبية</h2>

<div class="card">

<div class="grid">

<select id="patientSelect"></select>

<select id="operationType">

<option>Angioplasty</option>

<option>CABG Surgery</option>

<option>Pacemaker Implant</option>

<option>Valve Replacement</option>

<option>Cardiac Catheterization</option>

</select>

<input id="operationDate" type="date">

<input id="surgeon" placeholder="الجراح">

<input id="anesthesia" placeholder="طبيب التخدير">

<input id="assistant" placeholder="مساعد الجراح">

<input id="nurse" placeholder="الممرضة">

</div>

<button class="addBtn" onclick="addOperation()">

💾 تسجيل العملية

</button>

</div>


<h2>🧾 متابعة ما بعد العملية</h2>

<div class="card">

<div class="grid">

<input id="postBP" placeholder="ضغط الدم">

<input id="heartRate" placeholder="نبض القلب">

<input id="complications" placeholder="مضاعفات">

<input id="icuDays" placeholder="أيام العناية المركزة">

</div>

<button onclick="saveFollowUp()">

💾 حفظ المتابعة

</button>

</div>


<h2>📋 سجل العمليات</h2>

<table>

<thead>

<tr>

<th>المريض</th>

<th>العملية</th>

<th>التاريخ</th>

<th>الجراح</th>

<th>الحالة</th>

</tr>

</thead>

<tbody id="operationsTable"></tbody>

</table>


<h2>📊 إحصائيات العمليات</h2>

<canvas id="operationsChart"></canvas>

</div>

<script src="../js/operations.js"></script>

</body>

</html>
